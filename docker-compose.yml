services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: faultreport
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -h 127.0.0.1 ping | grep -q PONG || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/faultreport
      REDIS_URL: redis://redis:6379
      RUST_LOG: debug
      RUST_BACKTRACE: 1
      ALLOWED_ORIGINS: localhost:3000,localhost:5173,dashboard.faultreport.io
      # Optional runtime overrides useful for local/CI testing:
      # FIREBASE_CERTS_URL: https://www.googleapis.com/robot/v1/metadata/x509/securetoken@system.gserviceaccount.com
      # FIREBASE_PROJECT_ID: your-firebase-project-id
      # SLACK_WEBHOOK_URL: https://hooks.slack.com/services/...
      # NO_EXTERNAL_CALLS: "1"  # set in CI to prevent external network calls
      # ALERT_CB_THRESHOLD: "5"
      # ALERT_CB_COOLDOWN: "300"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      - postgres
      - redis
    command: ["sh", "-c", "until redis-cli -h redis ping | grep -q PONG; do echo waiting for redis; sleep 1; done; exec faultreport"]

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data: