version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: faultreport_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d faultreport_test"]
      interval: 5s
      timeout: 5s
      retries: 20
# Optional Redis for rate-limiting if needed
#  redis:
#    image: redis:7
#    ports:
#      - "6379:6379"
